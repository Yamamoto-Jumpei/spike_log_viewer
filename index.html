<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPIKE Prime Logger</title>
  <style>
    /* ============================================================
   Reset & Base
   ============================================================ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --border: #0f3460;
      --text: #e0e0e0;
      --text-dim: #888;
      --accent: #e94560;
      --green: #4ecca3;
      --yellow: #f0c040;
      --blue: #4db8ff;
      --orange: #ff8c42;
      --font-mono: 'Consolas', 'Monaco', 'Courier New', monospace;
    }

    body {
      font-family: var(--font-mono);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ============================================================
   Header
   ============================================================ */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      margin-right: auto;
      white-space: nowrap;
    }

    header h1 span {
      color: var(--accent);
    }

    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      font-family: var(--font-mono);
      font-size: 13px;
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    button:hover {
      background: var(--border);
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    button.primary:hover {
      background: #c23152;
    }

    button.primary:disabled {
      background: var(--accent);
    }

    .mode-switch {
      display: flex;
      gap: 0;
    }

    .mode-switch button.mode {
      border-radius: 0;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid var(--border);
      color: var(--text-dim);
      background: var(--bg);
    }

    .mode-switch button.mode:first-child {
      border-radius: 4px 0 0 4px;
    }

    .mode-switch button.mode:last-child {
      border-radius: 0 4px 4px 0;
      border-left: none;
    }

    .mode-switch button.mode.active {
      background: var(--border);
      color: var(--blue);
      border-color: var(--blue);
    }

    .mode-switch button.mode.active+button.mode {
      border-left-color: var(--blue);
    }

    #status {
      font-size: 12px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #status .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      display: inline-block;
    }

    #status.connected .dot {
      background: var(--green);
    }

    /* ============================================================
   Main Layout
   ============================================================ */
    main {
      flex: 1;
      display: flex;
      gap: 0;
      overflow: hidden;
      min-height: 0;
    }

    .panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      min-width: 0;
      min-height: 0;
    }

    .panel:last-child {
      border-right: none;
    }

    .panel-header {
      padding: 8px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    /* ---- Log Panel ---- */
    #log-panel {
      flex: 1;
      min-width: 300px;
    }

    .filters {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .filters button {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .filters button.active {
      background: var(--border);
      border-color: var(--blue);
      color: var(--blue);
    }

    #log-output {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
      padding: 8px 12px;
      font-size: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .log-line {
      padding: 1px 0;
    }

    .log-line.tag-Measure {
      color: var(--green);
    }

    .log-line.tag-ODO {
      color: var(--blue);
    }

    .log-line.tag-CAL {
      color: var(--yellow);
    }

    .log-line.tag-CALT {
      color: var(--orange);
    }

    .log-line.tag-MAP {
      color: #f0e68c;
    }

    .log-line.tag-Other {
      color: var(--text-dim);
    }

    .log-line.hidden {
      display: none;
    }

    #log-count {
      font-size: 11px;
      color: var(--text-dim);
      margin-left: auto;
    }

    /* ---- Plot Panel ---- */
    #plot-panel {
      flex: 1;
      min-width: 300px;
    }

    #plot-canvas {
      flex: 1;
      width: 100%;
      background: #0d1117;
      display: block;
    }

    #plot-info {
      font-size: 11px;
      color: var(--text-dim);
      margin-left: auto;
    }

    #lap-time {
      font-size: 11px;
      color: var(--orange);
      margin-left: 10px;
      font-weight: 600;
      white-space: nowrap;
    }

    #lap-time.is-idle,
    #lap-time.is-unavailable {
      color: var(--text-dim);
      font-weight: 400;
    }

    #lap-time.is-running {
      color: var(--yellow);
    }

    #lap-time.is-done {
      color: var(--green);
    }

    /* ---- Tuning Panel ---- */
    #tuning-panel {
      flex: 1;
      min-width: 280px;
      max-width: 360px;
    }

    #tuning-content {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
      padding: 10px 12px;
      font-size: 11px;
      line-height: 1.5;
    }

    .tuning-section {
      margin-bottom: 14px;
    }

    .tuning-section h3 {
      font-size: 11px;
      font-weight: 600;
      color: var(--blue);
      border-bottom: 1px solid var(--border);
      padding-bottom: 4px;
      margin-bottom: 6px;
    }

    .tuning-row {
      display: flex;
      justify-content: space-between;
      padding: 1px 0;
    }

    .tuning-row .label {
      color: var(--text-dim);
    }

    .tuning-row .value {
      color: var(--text);
      font-weight: 600;
    }

    .tuning-row .delta {
      font-size: 10px;
      margin-left: 6px;
    }

    .tuning-row .delta.up {
      color: var(--green);
    }

    .tuning-row .delta.down {
      color: var(--accent);
    }

    .tuning-row .delta.same {
      color: var(--text-dim);
    }

    .tuning-placeholder {
      color: var(--text-dim);
      text-align: center;
      padding: 30px 10px;
    }

    .tuning-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .tuning-actions button {
      font-size: 11px;
      padding: 4px 10px;
    }

    #tuning-histogram {
      width: 100%;
      height: 80px;
      background: #0d1117;
      border-radius: 4px;
      display: block;
    }

    .worst-section {
      color: var(--accent);
      font-weight: 600;
    }

    /* ============================================================
   Responsive
   ============================================================ */
    @media (max-width: 768px) {
      main {
        flex-direction: column;
      }

      .panel {
        border-right: none;
        border-bottom: 1px solid var(--border);
        min-height: 0;
        flex: 1;
      }

      .panel:last-child {
        border-bottom: none;
      }

      #tuning-panel {
        max-width: none;
      }
    }

    /* ============================================================
   Scrollbar
   ============================================================ */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #1a4a8a;
    }

    /* ============================================================
   Not-supported banner
   ============================================================ */
    #not-supported {
      display: none;
      padding: 20px;
      text-align: center;
      color: var(--yellow);
      font-size: 14px;
    }
  </style>
</head>

<body>

  <header>
    <h1><span>SPIKE Prime</span> Logger</h1>
    <div class="toolbar">
      <div class="mode-switch">
        <button id="btn-mode-ble" class="mode active">BLE</button>
        <button id="btn-mode-usb" class="mode">USB</button>
      </div>
      <button id="btn-connect" class="primary">Connect</button>
      <button id="btn-disconnect" disabled>Disconnect</button>
      <button id="btn-clear">Clear</button>
      <button id="btn-download">Download</button>
      <button id="btn-load">Load</button>
      <input type="file" id="file-input" accept=".log,.txt" style="display:none">
    </div>
    <div id="status">
      <span class="dot"></span>
      <span id="status-text">Disconnected</span>
    </div>
  </header>

  <div id="not-supported">
    Neither Web Bluetooth nor Web Serial is supported in this browser.<br>
    Please use Chrome or Edge on desktop.
  </div>

  <main id="main-content">
    <!-- Log Panel -->
    <div class="panel" id="log-panel">
      <div class="panel-header">
        <span>Log</span>
        <div class="filters">
          <button class="active" data-filter="All">All</button>
          <button class="active" data-filter="Measure">Measure</button>
          <button class="active" data-filter="CALT">CALT</button>
          <button class="active" data-filter="ODO">ODO</button>
          <button class="active" data-filter="CAL">CAL</button>
          <button class="active" data-filter="MAP">MAP</button>
          <button class="active" data-filter="Other">Other</button>
        </div>
        <span id="log-count">0 lines</span>
      </div>
      <div id="log-output"></div>
    </div>

    <!-- Plot Panel -->
    <div class="panel" id="plot-panel">
      <div class="panel-header">
        <span>Trajectory</span>
        <button id="btn-plot-clear" style="font-size:11px;padding:2px 8px;">Reset View</button>
        <span id="plot-info">0 points</span>
        <span id="lap-time" class="is-idle">Race Lap: --</span>
      </div>
      <canvas id="plot-canvas"></canvas>
    </div>

    <!-- Tuning Panel -->
    <div class="panel" id="tuning-panel">
      <div class="panel-header">
        <span>Tuning</span>
        <span id="tuning-status" style="font-size:11px;color:var(--text-dim);margin-left:auto;">No data</span>
      </div>
      <div id="tuning-content">
        <div class="tuning-placeholder">
          Waiting for [CALT] log data...<br><br>
          Run a course or load a .log file<br>
          to analyze and recommend parameters.
        </div>
      </div>
    </div>
  </main>

  <script>
    /* ============================================================
       Constants
       ============================================================ */
    // Pybricks Service: advertised in BLE advertising data (used for device filtering)
    const PYBRICKS_SERVICE_UUID = 'c5f50001-8280-46da-89f4-6d8051e4aeef';

    // Nordic UART Service (NUS): NOT advertised, discoverable after connection only
    const NUS_SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
    const NUS_RX_CHAR_UUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
    const NUS_TX_CHAR_UUID = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

    /* ============================================================
       State
       ============================================================ */
    // Connection mode: 'ble' or 'usb'
    let connMode = 'ble';

    // BLE state
    let bleDevice = null;
    let rxCharacteristic = null;  // NUS RX (write to device)
    let txCharacteristic = null;  // NUS TX (receive from device)

    // USB (Web Serial) state
    let serialPort = null;
    let serialReader = null;
    let serialReadable = null;  // ReadableStream from port
    let usbReadLoopRunning = false;

    // Common state
    let receiveBuffer = '';
    const logLines = [];        // { text, tag, element }
    const odoPoints = [];       // { x, y, theta, phase }
    const mapSegments = [];     // { type:'L'|'A', ...params }
    let autoScroll = true;
    let currentPhase = 'idle';  // 'idle' | 'measure' | 'course'
    const activeFilters = new Set(['All', 'Measure', 'ODO', 'CAL', 'CALT', 'MAP', 'Other']);

    // Tuning state
    const tuningData = {
      target: null,           // calibration target reflection
      caltSamples: [],        // { ref, spd, sec } from [CALT] periodic logs
      currentConfig: null,    // parsed from [CALT] config lines
      lastAnalysis: null,     // cached analysis result
    };

    const raceLap = {
      startAt: null,
      elapsedMs: null,
      status: 'idle',     // 'idle' | 'running' | 'done' | 'unavailable'
    };

    // Fallback default parameters (used when config log is not available)
    const DEFAULT_CONFIG = {
      kp: 3.5, ki: 0.0, kd: 0.6,
      baseSpeed: 800, outputLimit: 800,
      curveSlowdown: 0.30, rateLimit: 5,
      straightSpeed: 1000, minCurveSpeed: 400, preBrakeDist: 250,
    };

    /* ============================================================
       DOM Refs
       ============================================================ */
    const btnConnect = document.getElementById('btn-connect');
    const btnDisconnect = document.getElementById('btn-disconnect');
    const btnModeBle = document.getElementById('btn-mode-ble');
    const btnModeUsb = document.getElementById('btn-mode-usb');
    const btnClear = document.getElementById('btn-clear');
    const btnDownload = document.getElementById('btn-download');
    const btnLoad = document.getElementById('btn-load');
    const fileInput = document.getElementById('file-input');
    const btnPlotClear = document.getElementById('btn-plot-clear');
    const statusEl = document.getElementById('status');
    const statusText = document.getElementById('status-text');
    const logOutput = document.getElementById('log-output');
    const logCount = document.getElementById('log-count');
    const plotInfo = document.getElementById('plot-info');
    const lapTimeEl = document.getElementById('lap-time');
    const canvas = document.getElementById('plot-canvas');
    const ctx = canvas.getContext('2d');

    function resetRaceLap(status = 'idle') {
      raceLap.startAt = null;
      raceLap.elapsedMs = null;
      raceLap.status = status;
      renderRaceLap();
    }

    function formatLapTime(ms) {
      const totalMs = Math.max(0, Math.round(ms));
      const minutes = Math.floor(totalMs / 60000);
      const seconds = Math.floor((totalMs % 60000) / 1000);
      const millis = totalMs % 1000;
      if (minutes > 0) {
        return String(minutes) + ':' + String(seconds).padStart(2, '0') + '.' +
          String(millis).padStart(3, '0');
      }
      return String(seconds) + '.' + String(millis).padStart(3, '0') + ' s';
    }

    function renderRaceLap() {
      lapTimeEl.className = '';
      lapTimeEl.classList.add('is-' + raceLap.status);

      if (raceLap.status === 'running') {
        lapTimeEl.textContent = 'Race Lap: Running...';
        return;
      }
      if (raceLap.status === 'done' && raceLap.elapsedMs != null) {
        lapTimeEl.textContent = 'Race Lap: ' + formatLapTime(raceLap.elapsedMs);
        return;
      }
      if (raceLap.status === 'unavailable') {
        lapTimeEl.textContent = 'Race Lap: unavailable for loaded logs';
        return;
      }
      lapTimeEl.textContent = 'Race Lap: --';
    }

    renderRaceLap();

    /* ============================================================
       API Support Check
       ============================================================ */
    const hasBLE = !!navigator.bluetooth;
    const hasSerial = !!navigator.serial;

    if (!hasBLE && !hasSerial) {
      document.getElementById('not-supported').style.display = 'block';
      document.getElementById('main-content').style.display = 'none';
      btnConnect.disabled = true;
    }

    // Disable mode buttons for unsupported APIs
    if (!hasBLE) btnModeBle.disabled = true;
    if (!hasSerial) btnModeUsb.disabled = true;

    // If default mode is unsupported, switch
    if (!hasBLE && hasSerial) {
      connMode = 'usb';
      btnModeBle.classList.remove('active');
      btnModeUsb.classList.add('active');
    }

    /* ============================================================
       Mode Switch
       ============================================================ */
    btnModeBle.addEventListener('click', () => {
      if (!hasBLE || connMode === 'ble') return;
      connMode = 'ble';
      btnModeBle.classList.add('active');
      btnModeUsb.classList.remove('active');
    });

    btnModeUsb.addEventListener('click', () => {
      if (!hasSerial || connMode === 'usb') return;
      connMode = 'usb';
      btnModeUsb.classList.add('active');
      btnModeBle.classList.remove('active');
    });

    /* ============================================================
       Connection Dispatcher
       ============================================================ */
    async function connect() {
      if (connMode === 'usb') { await connectUSB(); }
      else { await connectBLE(); }
    }

    function disconnect() {
      if (connMode === 'usb') { disconnectUSB(); }
      else { disconnectBLE(); }
    }

    function onConnected(label) {
      setStatus('Connected: ' + label, true);
      btnConnect.disabled = true;
      btnDisconnect.disabled = false;
      btnModeBle.disabled = true;
      btnModeUsb.disabled = true;
    }

    function onDisconnected() {
      rxCharacteristic = null;
      txCharacteristic = null;
      serialPort = null;
      serialReader = null;
      serialReadable = null;
      usbReadLoopRunning = false;
      setStatus('Disconnected');
      btnConnect.disabled = false;
      btnDisconnect.disabled = true;
      if (hasBLE) btnModeBle.disabled = false;
      if (hasSerial) btnModeUsb.disabled = false;
    }

    function setStatus(text, connected) {
      statusText.textContent = text;
      if (connected) {
        statusEl.classList.add('connected');
      } else {
        statusEl.classList.remove('connected');
      }
    }

    /* ============================================================
       BLE Connection
       ============================================================ */
    async function connectBLE() {
      try {
        setStatus('Requesting device...');
        bleDevice = await navigator.bluetooth.requestDevice({
          filters: [{ services: [PYBRICKS_SERVICE_UUID] }],
          optionalServices: [NUS_SERVICE_UUID],
        });

        bleDevice.addEventListener('gattserverdisconnected', onDisconnected);

        setStatus('Connecting GATT...');
        const server = await bleDevice.gatt.connect();

        // NUS サービスを取得して通信路を開く
        setStatus('Subscribing to NUS...');
        const nusService = await server.getPrimaryService(NUS_SERVICE_UUID);

        rxCharacteristic = await nusService.getCharacteristic(NUS_RX_CHAR_UUID);
        txCharacteristic = await nusService.getCharacteristic(NUS_TX_CHAR_UUID);

        await txCharacteristic.startNotifications();
        txCharacteristic.addEventListener('characteristicvaluechanged', onBLEReceive);

        onConnected(bleDevice.name || 'BLE Device');
      } catch (err) {
        if (err.name === 'NotFoundError') {
          setStatus('No device selected');
        } else {
          setStatus('Error: ' + err.message);
          console.error('[BLE]', err);
          if (bleDevice && bleDevice.gatt.connected) {
            bleDevice.gatt.disconnect();
          }
        }
      }
    }

    function disconnectBLE() {
      if (bleDevice && bleDevice.gatt.connected) {
        bleDevice.gatt.disconnect();
      }
    }

    /* ============================================================
       USB (Web Serial) Connection
       ============================================================ */
    async function connectUSB() {
      try {
        setStatus('Requesting serial port...');
        serialPort = await navigator.serial.requestPort();

        setStatus('Opening port...');
        await serialPort.open({ baudRate: 115200 });

        serialPort.addEventListener('disconnect', onDisconnected);

        usbReadLoopRunning = true;
        usbReadLoop();   // fire-and-forget async

        onConnected('USB Serial');
      } catch (err) {
        if (err.name === 'NotFoundError') {
          setStatus('No port selected');
        } else {
          setStatus('Error: ' + err.message);
          console.error('[USB]', err);
        }
      }
    }

    async function usbReadLoop() {
      const decoder = new TextDecoderStream();
      serialReadable = serialPort.readable.pipeThrough(decoder);
      serialReader = serialReadable.getReader();
      try {
        while (usbReadLoopRunning) {
          const { value, done } = await serialReader.read();
          if (done) break;
          if (value) feedText(value);
        }
      } catch (err) {
        if (usbReadLoopRunning) {
          console.error('[USB] read error:', err);
          setStatus('USB read error: ' + err.message);
        }
      } finally {
        serialReader.releaseLock();
        serialReader = null;
      }
    }

    async function disconnectUSB() {
      usbReadLoopRunning = false;
      try {
        if (serialReader) {
          await serialReader.cancel();
        }
      } catch (e) { /* ignore */ }
      try {
        if (serialPort) {
          await serialPort.close();
        }
      } catch (e) { /* ignore */ }
      onDisconnected();
    }

    /* ============================================================
       Data Reception & Parsing
       ============================================================ */
    function onBLEReceive(event) {
      const value = event.target.value;
      const chunk = new TextDecoder().decode(value);
      feedText(chunk);
    }

    function feedText(chunk) {
      receiveBuffer += chunk.replace(/\u0000/g, '');
      const parts = receiveBuffer.split('\n');
      receiveBuffer = parts.pop(); // keep incomplete trailing part

      for (const raw of parts) {
        const line = raw.replace(/\r$/, '').trim();
        if (line.length === 0) continue;
        processLine(line, 'live');
      }
    }

    function classifyTag(line) {
      if (line.includes('[Measure]')) return 'Measure';
      if (line.includes('[CALT]')) return 'CALT';
      if (line.includes('[ODO]')) return 'ODO';
      if (line.includes('[CAL]')) return 'CAL';
      if (line.includes('[MAP]')) return 'MAP';
      return 'Other';
    }

    function processLine(text, source = 'live') {
      const tag = classifyTag(text);

      // Detect phase transitions from log messages
      if (tag === 'Measure' && text.includes('START')) {
        currentPhase = 'measure';
      } else if (tag === 'CALT' && text.includes('started')) {
        currentPhase = 'course';
      }

      // Parse CAL target for tuning
      if (tag === 'CAL') {
        const mc = text.match(/\[CAL\]\s+Applied:\s+target=(\d+)/);
        if (mc) {
          tuningData.target = parseInt(mc[1], 10);
        }
      }

      // Parse CALT data for tuning
      if (tag === 'CALT') {
        const hasRaceLapEvent = text.includes('[CALT] START pos=') ||
          text.includes('[CALT] LAP COMPLETE');
        if (source === 'file' && hasRaceLapEvent) {
          raceLap.status = 'unavailable';
          renderRaceLap();
        }

        if (source === 'live') {
          if (text.includes('[CALT] START pos=')) {
            raceLap.startAt = performance.now();
            raceLap.elapsedMs = null;
            raceLap.status = 'running';
            renderRaceLap();
          } else if (text.includes('[CALT] LAP COMPLETE') && raceLap.startAt != null) {
            raceLap.elapsedMs = performance.now() - raceLap.startAt;
            raceLap.status = 'done';
            renderRaceLap();
          }
        }

        // Periodic sample: [CALT] ref=XX spd=YY sec=ZZ rem=WW
        const mr = text.match(/\[CALT\]\s+ref=(-?\d+)\s+spd=(-?\d+)\s+sec=(-?\d+)\s+rem=(-?\d+)/);
        if (mr) {
          tuningData.caltSamples.push({
            ref: parseInt(mr[1], 10),
            spd: parseInt(mr[2], 10),
            sec: parseInt(mr[3], 10),
            rem: parseInt(mr[4], 10),
          });
          requestTuningUpdate();
        }
        // Config line: [CALT] config kp=XX ki=YY kd=ZZ (values are x100)
        const mkp = text.match(/\[CALT\]\s+config\s+kp=(-?\d+)\s+ki=(-?\d+)\s+kd=(-?\d+)/);
        if (mkp) {
          if (!tuningData.currentConfig) tuningData.currentConfig = {};
          tuningData.currentConfig.kp = parseInt(mkp[1], 10) / 100;
          tuningData.currentConfig.ki = parseInt(mkp[2], 10) / 100;
          tuningData.currentConfig.kd = parseInt(mkp[3], 10) / 100;
        }
        // Config line: [CALT] config base=XX limit=YY
        const mbl = text.match(/\[CALT\]\s+config\s+base=(-?\d+)\s+limit=(-?\d+)/);
        if (mbl) {
          if (!tuningData.currentConfig) tuningData.currentConfig = {};
          tuningData.currentConfig.baseSpeed = parseInt(mbl[1], 10);
          tuningData.currentConfig.outputLimit = parseInt(mbl[2], 10);
        }
        // Config line: [CALT] config curve=XX rate=YY (curve is x100)
        const mcr = text.match(/\[CALT\]\s+config\s+curve=(-?\d+)\s+rate=(-?\d+)/);
        if (mcr) {
          if (!tuningData.currentConfig) tuningData.currentConfig = {};
          tuningData.currentConfig.curveSlowdown = parseInt(mcr[1], 10) / 100;
          tuningData.currentConfig.rateLimit = parseInt(mcr[2], 10);
        }
        // Config line: [CALT] config straight=XX minCurve=YY
        const msc = text.match(/\[CALT\]\s+config\s+straight=(-?\d+)\s+minCurve=(-?\d+)/);
        if (msc) {
          if (!tuningData.currentConfig) tuningData.currentConfig = {};
          tuningData.currentConfig.straightSpeed = parseInt(msc[1], 10);
          tuningData.currentConfig.minCurveSpeed = parseInt(msc[2], 10);
        }
        // Config line: [CALT] config preBrake=XX
        const mpb = text.match(/\[CALT\]\s+config\s+preBrake=(-?\d+)/);
        if (mpb) {
          if (!tuningData.currentConfig) tuningData.currentConfig = {};
          tuningData.currentConfig.preBrakeDist = parseInt(mpb[1], 10);
        }
      }

      // Parse ODO data for trajectory
      if (tag === 'ODO') {
        const m = text.match(/\[ODO\]\s+x=(-?\d+)\s+y=(-?\d+)\s+theta=(-?\d+)/);
        if (m) {
          odoPoints.push({
            x: parseInt(m[1], 10),
            y: parseInt(m[2], 10),
            theta: parseInt(m[3], 10),
            phase: currentPhase,
          });
          plotInfo.textContent = odoPoints.length + ' points';
          requestPlotRedraw();
        }
      }

      // Parse MAP data for course map overlay
      if (tag === 'MAP') {
        // Line: [MAP] L idx (x1,y1)-(x2,y2)
        const ml = text.match(/\[MAP\]\s+L\s+(\d+)\s+\((-?\d+),(-?\d+)\)-\((-?\d+),(-?\d+)\)/);
        if (ml) {
          const idx = parseInt(ml[1], 10);
          mapSegments[idx] = {
            type: 'L',
            x1: parseInt(ml[2], 10), y1: parseInt(ml[3], 10),
            x2: parseInt(ml[4], 10), y2: parseInt(ml[5], 10),
          };
          requestPlotRedraw();
        }
        // Arc main: [MAP] A idx c=(cx,cy) r=R sa=SA
        const ma = text.match(/\[MAP\]\s+A\s+(\d+)\s+c=\((-?\d+),(-?\d+)\)\s+r=(-?\d+)\s+sa=(-?\d+)/);
        if (ma) {
          const idx = parseInt(ma[1], 10);
          mapSegments[idx] = {
            type: 'A',
            cx: parseInt(ma[2], 10), cy: parseInt(ma[3], 10),
            radius: parseInt(ma[4], 10),
            startAngle: parseInt(ma[5], 10),
            sweep: 0,
          };
          requestPlotRedraw();
        }
        // Arc sweep: [MAP] A idx sw=SW
        const ms = text.match(/\[MAP\]\s+A\s+(\d+)\s+sw=(-?\d+)/);
        if (ms && !ma) {
          const idx = parseInt(ms[1], 10);
          if (mapSegments[idx] && mapSegments[idx].type === 'A') {
            mapSegments[idx].sweep = parseInt(ms[2], 10);
            requestPlotRedraw();
          }
        }
      }

      // Create log element
      const el = document.createElement('div');
      el.className = 'log-line tag-' + tag;
      el.textContent = text;

      // Apply filter visibility
      if (!activeFilters.has(tag) && !activeFilters.has('All')) {
        el.classList.add('hidden');
      }

      const entry = { text, tag, element: el };
      logLines.push(entry);

      logOutput.appendChild(el);
      logCount.textContent = logLines.length + ' lines';

      // Auto-scroll
      if (autoScroll) {
        logOutput.scrollTop = logOutput.scrollHeight;
      }
    }

    /* ============================================================
       Log auto-scroll detection
       ============================================================ */
    logOutput.addEventListener('scroll', () => {
      const threshold = 40;
      autoScroll =
        logOutput.scrollTop + logOutput.clientHeight >=
        logOutput.scrollHeight - threshold;
    });

    /* ============================================================
       Filters
       ============================================================ */
    document.querySelectorAll('.filters button').forEach((btn) => {
      btn.addEventListener('click', () => {
        const filter = btn.dataset.filter;

        if (filter === 'All') {
          // Toggle All: if All is active, deactivate all; if inactive, activate all
          if (activeFilters.has('All')) {
            activeFilters.clear();
          } else {
            activeFilters.add('All');
            activeFilters.add('Measure');
            activeFilters.add('CALT');
            activeFilters.add('ODO');
            activeFilters.add('CAL');
            activeFilters.add('MAP');
            activeFilters.add('Other');
          }
        } else {
          if (activeFilters.has(filter)) {
            activeFilters.delete(filter);
            activeFilters.delete('All');
          } else {
            activeFilters.add(filter);
            // Check if all individual filters are active
            if (
              activeFilters.has('Measure') &&
              activeFilters.has('CALT') &&
              activeFilters.has('ODO') &&
              activeFilters.has('CAL') &&
              activeFilters.has('MAP') &&
              activeFilters.has('Other')
            ) {
              activeFilters.add('All');
            }
          }
        }

        // Update button states
        document.querySelectorAll('.filters button').forEach((b) => {
          b.classList.toggle('active', activeFilters.has(b.dataset.filter));
        });

        // Apply visibility
        applyFilters();
      });
    });

    function applyFilters() {
      const showAll = activeFilters.has('All');
      for (const entry of logLines) {
        const visible = showAll || activeFilters.has(entry.tag);
        entry.element.classList.toggle('hidden', !visible);
      }
    }

    /* ============================================================
       Clear & Download
       ============================================================ */
    btnClear.addEventListener('click', () => {
      logLines.length = 0;
      odoPoints.length = 0;
      mapSegments.length = 0;
      resetRaceLap();
      logOutput.innerHTML = '';
      logCount.textContent = '0 lines';
      plotInfo.textContent = '0 points';
      receiveBuffer = '';
      currentPhase = 'idle';
      // Reset tuning state
      tuningData.target = null;
      tuningData.caltSamples.length = 0;
      tuningData.currentConfig = null;
      tuningData.lastAnalysis = null;
      renderTuningPanel();
      requestPlotRedraw();
    });

    btnDownload.addEventListener('click', () => {
      if (logLines.length === 0) return;
      const content = logLines.map((e) => e.text).join('\n') + '\n';
      const blob = new Blob([content], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const now = new Date();
      const ts =
        now.getFullYear().toString() +
        (now.getMonth() + 1).toString().padStart(2, '0') +
        now.getDate().toString().padStart(2, '0') +
        '_' +
        now.getHours().toString().padStart(2, '0') +
        now.getMinutes().toString().padStart(2, '0') +
        now.getSeconds().toString().padStart(2, '0');
      a.href = url;
      a.download = 'spike_log_' + ts + '.log';
      a.click();
      URL.revokeObjectURL(url);
    });

    btnConnect.addEventListener('click', connect);
    btnDisconnect.addEventListener('click', disconnect);

    /* ============================================================
       Load log file
       ============================================================ */
    btnLoad.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (ev) => {
        // Clear existing data
        logLines.length = 0;
        odoPoints.length = 0;
        mapSegments.length = 0;
        resetRaceLap();
        logOutput.innerHTML = '';
        logCount.textContent = '0 lines';
        plotInfo.textContent = '0 points';
        receiveBuffer = '';
        currentPhase = 'idle';
        // Reset tuning state
        tuningData.target = null;
        tuningData.caltSamples.length = 0;
        tuningData.currentConfig = null;
        tuningData.lastAnalysis = null;

        // Process each line through the existing pipeline
        const lines = ev.target.result.split('\n');
        for (const raw of lines) {
          const line = raw.replace(/\r$/, '').trim();
          if (line.length === 0) continue;
          processLine(line, 'file');
        }

        // Scroll to top after loading
        autoScroll = false;
        logOutput.scrollTop = 0;

        // Trigger tuning analysis after loading
        runTuningAnalysis();

        setStatus('Loaded: ' + file.name + ' (' + logLines.length + ' lines)');
      };
      reader.readAsText(file);

      // Reset so the same file can be re-selected
      fileInput.value = '';
    });

    /* ============================================================
       Trajectory Plot (Canvas 2D)
       ============================================================ */
    let plotRedrawRequested = false;

    function requestPlotRedraw() {
      if (!plotRedrawRequested) {
        plotRedrawRequested = true;
        requestAnimationFrame(() => {
          plotRedrawRequested = false;
          drawPlot();
        });
      }
    }

    function resizeCanvas() {
      const panel = document.getElementById('plot-panel');
      const header = panel.querySelector('.panel-header');
      const rect = panel.getBoundingClientRect();
      const headerH = header.getBoundingClientRect().height;
      const dpr = window.devicePixelRatio || 1;
      const w = rect.width;
      const h = rect.height - headerH;

      canvas.width = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      requestPlotRedraw();
    }

    window.addEventListener('resize', resizeCanvas);

    // Initial sizing after layout
    setTimeout(resizeCanvas, 50);

    btnPlotClear.addEventListener('click', () => {
      odoPoints.length = 0;
      plotInfo.textContent = '0 points';
      requestPlotRedraw();
    });

    function drawPlot() {
      const w = canvas.width / (window.devicePixelRatio || 1);
      const h = canvas.height / (window.devicePixelRatio || 1);

      // Clear
      ctx.fillStyle = '#0d1117';
      ctx.fillRect(0, 0, w, h);

      if (odoPoints.length === 0) {
        ctx.fillStyle = '#444';
        ctx.font = '13px ' + getComputedStyle(document.body).fontFamily;
        ctx.textAlign = 'center';
        ctx.fillText('Waiting for [ODO] data...', w / 2, h / 2);
        return;
      }

      // Compute bounds
      const margin = 50;
      let minX = Infinity, maxX = -Infinity;
      let minY = Infinity, maxY = -Infinity;
      for (const p of odoPoints) {
        if (p.x < minX) minX = p.x;
        if (p.x > maxX) maxX = p.x;
        if (p.y < minY) minY = p.y;
        if (p.y > maxY) maxY = p.y;
      }
      // Include map segment bounds
      for (const s of mapSegments) {
        if (!s) continue;
        if (s.type === 'L') {
          if (s.x1 < minX) minX = s.x1; if (s.x1 > maxX) maxX = s.x1;
          if (s.y1 < minY) minY = s.y1; if (s.y1 > maxY) maxY = s.y1;
          if (s.x2 < minX) minX = s.x2; if (s.x2 > maxX) maxX = s.x2;
          if (s.y2 < minY) minY = s.y2; if (s.y2 > maxY) maxY = s.y2;
        } else if (s.type === 'A') {
          const r = s.radius;
          if (s.cx - r < minX) minX = s.cx - r;
          if (s.cx + r > maxX) maxX = s.cx + r;
          if (s.cy - r < minY) minY = s.cy - r;
          if (s.cy + r > maxY) maxY = s.cy + r;
        }
      }

      // Ensure non-zero range
      if (maxX - minX < 10) { minX -= 50; maxX += 50; }
      if (maxY - minY < 10) { minY -= 50; maxY += 50; }

      // Add 10% padding
      const padX = (maxX - minX) * 0.1;
      const padY = (maxY - minY) * 0.1;
      minX -= padX; maxX += padX;
      minY -= padY; maxY += padY;

      const plotW = w - margin * 2;
      const plotH = h - margin * 2;
      const rangeX = maxX - minX;
      const rangeY = maxY - minY;

      // Uniform scale (aspect ratio 1:1)
      const scale = Math.min(plotW / rangeX, plotH / rangeY);
      const offsetX = margin + (plotW - rangeX * scale) / 2;
      const offsetY = margin + (plotH - rangeY * scale) / 2;

      function toScreenX(x) { return offsetX + (x - minX) * scale; }
      function toScreenY(y) { return offsetY + (maxY - y) * scale; } // Y-axis inverted

      // Grid
      drawGrid(w, h, margin, minX, maxX, minY, maxY, toScreenX, toScreenY);

      // Course map overlay (drawn before trajectory so it appears behind)
      if (mapSegments.length > 0) {
        ctx.lineWidth = 3;
        ctx.setLineDash([6, 4]);
        ctx.strokeStyle = 'rgba(255, 220, 100, 0.6)';
        for (const seg of mapSegments) {
          if (!seg) continue;
          if (seg.type === 'L') {
            ctx.beginPath();
            ctx.moveTo(toScreenX(seg.x1), toScreenY(seg.y1));
            ctx.lineTo(toScreenX(seg.x2), toScreenY(seg.y2));
            ctx.stroke();
          } else if (seg.type === 'A') {
            const rad = seg.radius * scale;
            const startRad = -seg.startAngle * Math.PI / 180;
            const sweepRad = -seg.sweep * Math.PI / 180;
            ctx.beginPath();
            ctx.arc(
              toScreenX(seg.cx), toScreenY(seg.cy), rad,
              startRad, startRad + sweepRad,
              seg.sweep > 0  // counterclockwise flag (canvas Y is inverted)
            );
            ctx.stroke();
          }
        }
        ctx.setLineDash([]);
      }

      // Trajectory line (phase-colored segments)
      ctx.lineWidth = 1.5;
      ctx.lineJoin = 'round';
      let segPhase = odoPoints[0].phase;
      ctx.beginPath();
      ctx.strokeStyle = phaseColor(segPhase);
      ctx.moveTo(toScreenX(odoPoints[0].x), toScreenY(odoPoints[0].y));
      for (let i = 1; i < odoPoints.length; i++) {
        const p = odoPoints[i];
        const sx = toScreenX(p.x);
        const sy = toScreenY(p.y);
        if (p.phase !== segPhase) {
          // Finish previous segment
          ctx.lineTo(sx, sy);
          ctx.stroke();
          // Start new segment with new color
          segPhase = p.phase;
          ctx.beginPath();
          ctx.strokeStyle = phaseColor(segPhase);
          ctx.moveTo(sx, sy);
        } else {
          ctx.lineTo(sx, sy);
        }
      }
      ctx.stroke();

      // Start marker (green circle)
      const s0 = odoPoints[0];
      ctx.beginPath();
      ctx.arc(toScreenX(s0.x), toScreenY(s0.y), 5, 0, Math.PI * 2);
      ctx.fillStyle = '#4ecca3';
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Current position marker (red circle)
      const last = odoPoints[odoPoints.length - 1];
      ctx.beginPath();
      ctx.arc(toScreenX(last.x), toScreenY(last.y), 5, 0, Math.PI * 2);
      ctx.fillStyle = '#e94560';
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Direction arrow at current position
      if (odoPoints.length >= 2) {
        const thetaRad = (last.theta * Math.PI) / 180;
        const arrowLen = 15;
        const ax = toScreenX(last.x) + arrowLen * Math.cos(thetaRad);
        const ay = toScreenY(last.y) - arrowLen * Math.sin(thetaRad);
        ctx.beginPath();
        ctx.moveTo(toScreenX(last.x), toScreenY(last.y));
        ctx.lineTo(ax, ay);
        ctx.strokeStyle = '#e94560';
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      // Legend
      ctx.font = '11px ' + getComputedStyle(document.body).fontFamily;
      ctx.textAlign = 'left';
      let ly = 10;
      const legendH = 14;

      ctx.fillStyle = '#4ecca3';
      ctx.fillRect(w - 120, ly, 8, 8);
      ctx.fillStyle = '#aaa';
      ctx.fillText('Start', w - 108, ly + 8);
      ly += legendH;

      ctx.fillStyle = '#e94560';
      ctx.fillRect(w - 120, ly, 8, 8);
      ctx.fillStyle = '#aaa';
      ctx.fillText('Current', w - 108, ly + 8);
      ly += legendH;

      // Phase legend (only show phases that exist in data)
      const phases = new Set(odoPoints.map(p => p.phase));
      if (phases.has('measure')) {
        ly += 4;
        ctx.strokeStyle = phaseColor('measure');
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(w - 120, ly + 4);
        ctx.lineTo(w - 112, ly + 4);
        ctx.stroke();
        ctx.fillStyle = '#aaa';
        ctx.fillText('Measure', w - 108, ly + 8);
        ly += legendH;
      }
      if (phases.has('course')) {
        ctx.strokeStyle = phaseColor('course');
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(w - 120, ly + 4);
        ctx.lineTo(w - 112, ly + 4);
        ctx.stroke();
        ctx.fillStyle = '#aaa';
        ctx.fillText('Course', w - 108, ly + 8);
        ly += legendH;
      }
      if (mapSegments.some(s => s)) {
        ctx.strokeStyle = 'rgba(255, 220, 100, 0.6)';
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 3]);
        ctx.beginPath();
        ctx.moveTo(w - 120, ly + 4);
        ctx.lineTo(w - 112, ly + 4);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = '#aaa';
        ctx.fillText('Map', w - 108, ly + 8);
        ly += legendH;
      }
    }

    function drawGrid(w, h, margin, minX, maxX, minY, maxY, toSX, toSY) {
      ctx.font = '10px ' + getComputedStyle(document.body).fontFamily;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';

      // Compute nice grid step
      const rangeX = maxX - minX;
      const rangeY = maxY - minY;
      const stepX = niceStep(rangeX, 6);
      const stepY = niceStep(rangeY, 6);

      ctx.strokeStyle = '#1e2a3a';
      ctx.lineWidth = 0.5;

      // Vertical grid lines (X axis)
      const x0 = Math.ceil(minX / stepX) * stepX;
      for (let x = x0; x <= maxX; x += stepX) {
        const sx = toSX(x);
        if (sx < margin - 5 || sx > w - margin + 5) continue;
        ctx.beginPath();
        ctx.moveTo(sx, margin);
        ctx.lineTo(sx, h - margin);
        ctx.stroke();

        ctx.fillStyle = '#555';
        ctx.fillText(Math.round(x).toString(), sx, h - margin + 4);
      }

      // Horizontal grid lines (Y axis)
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      const y0 = Math.ceil(minY / stepY) * stepY;
      for (let y = y0; y <= maxY; y += stepY) {
        const sy = toSY(y);
        if (sy < margin - 5 || sy > h - margin + 5) continue;
        ctx.beginPath();
        ctx.moveTo(margin, sy);
        ctx.lineTo(w - margin, sy);
        ctx.stroke();

        ctx.fillStyle = '#555';
        ctx.fillText(Math.round(y).toString(), margin - 4, sy);
      }

      // Axis labels
      ctx.fillStyle = '#666';
      ctx.font = '11px ' + getComputedStyle(document.body).fontFamily;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText('X [mm]', w / 2, h - 12);

      ctx.save();
      ctx.translate(12, h / 2);
      ctx.rotate(-Math.PI / 2);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText('Y [mm]', 0, 0);
      ctx.restore();
    }

    function niceStep(range, targetTicks) {
      const rough = range / targetTicks;
      const pow10 = Math.pow(10, Math.floor(Math.log10(rough)));
      const frac = rough / pow10;
      let nice;
      if (frac <= 1.5) nice = 1;
      else if (frac <= 3.5) nice = 2;
      else if (frac <= 7.5) nice = 5;
      else nice = 10;
      return nice * pow10;
    }

    function var_blue() { return '#4db8ff'; }

    function phaseColor(phase) {
      switch (phase) {
        case 'measure': return '#4ecca3';  // green
        case 'course': return '#4db8ff';  // blue
        default: return '#888888';  // gray (idle/other)
      }
    }

    /* ============================================================
       Tuning Analysis
       ============================================================ */
    let tuningUpdateRequested = false;

    function requestTuningUpdate() {
      if (!tuningUpdateRequested) {
        tuningUpdateRequested = true;
        // Debounce: update at most every 500ms during live reception
        setTimeout(() => {
          tuningUpdateRequested = false;
          runTuningAnalysis();
        }, 500);
      }
    }

    function runTuningAnalysis() {
      const samples = tuningData.caltSamples;
      if (samples.length < 5) {
        tuningData.lastAnalysis = null;
        renderTuningPanel();
        return;
      }

      const target = tuningData.target;
      const config = tuningData.currentConfig || DEFAULT_CONFIG;

      // --- Error statistics ---
      const errors = samples.map(s => target != null ? target - s.ref : -s.ref);
      const n = errors.length;
      const mean = errors.reduce((a, b) => a + b, 0) / n;
      const variance = errors.reduce((a, e) => a + (e - mean) ** 2, 0) / n;
      const stddev = Math.sqrt(variance);
      const maxAbs = Math.max(...errors.map(Math.abs));

      // Oscillation count (sign reversals)
      let oscCount = 0;
      for (let i = 1; i < errors.length; i++) {
        if ((errors[i] > 0 && errors[i - 1] < 0) ||
          (errors[i] < 0 && errors[i - 1] > 0)) {
          oscCount++;
        }
      }
      const oscRate = oscCount / n;

      // --- Per-section-type statistics ---
      const lineErrors = [];
      const arcErrors = [];
      const sectionErrors = {};  // sec_index -> [errors]
      for (let i = 0; i < samples.length; i++) {
        const sec = samples[i].sec;
        const err = errors[i];
        if (!sectionErrors[sec]) sectionErrors[sec] = [];
        sectionErrors[sec].push(err);

        // Classify by segment type from mapSegments
        const seg = mapSegments[sec];
        if (seg) {
          if (seg.type === 'L') lineErrors.push(err);
          else if (seg.type === 'A') arcErrors.push(err);
        }
      }

      function calcStats(arr) {
        if (arr.length === 0) return { mean: 0, stddev: 0, maxAbs: 0, count: 0 };
        const m = arr.reduce((a, b) => a + b, 0) / arr.length;
        const v = arr.reduce((a, e) => a + (e - m) ** 2, 0) / arr.length;
        return {
          mean: m,
          stddev: Math.sqrt(v),
          maxAbs: Math.max(...arr.map(Math.abs)),
          count: arr.length,
        };
      }

      const lineStats = calcStats(lineErrors);
      const arcStats = calcStats(arcErrors);

      // Worst section
      let worstSec = -1;
      let worstStddev = 0;
      for (const [sec, errs] of Object.entries(sectionErrors)) {
        const st = calcStats(errs);
        if (st.stddev > worstStddev && errs.length >= 3) {
          worstStddev = st.stddev;
          worstSec = parseInt(sec, 10);
        }
      }

      // --- Course map analysis ---
      const courseStats = analyzeCourseMap();

      // --- Compute recommended parameters ---
      const recommended = computeRecommendedParams(
        { mean, variance, stddev, maxAbs, oscRate },
        { line: lineStats, arc: arcStats },
        courseStats,
        config,
      );

      tuningData.lastAnalysis = {
        errorStats: { mean, variance, stddev, maxAbs, oscCount, oscRate, sampleCount: n },
        lineStats,
        arcStats,
        worstSec,
        worstStddev,
        courseStats,
        config,
        recommended,
        errors,
      };

      renderTuningPanel();
    }

    function analyzeCourseMap() {
      const segs = mapSegments.filter(s => s);
      if (segs.length === 0) return null;

      let totalLength = 0;
      let straightLength = 0;
      let minRadius = Infinity;
      let arcCount = 0;

      for (const s of segs) {
        if (s.type === 'L') {
          const len = Math.sqrt((s.x2 - s.x1) ** 2 + (s.y2 - s.y1) ** 2);
          totalLength += len;
          straightLength += len;
        } else if (s.type === 'A') {
          const arcLen = s.radius * Math.abs(s.sweep) * Math.PI / 180;
          totalLength += arcLen;
          arcCount++;
          if (s.radius < minRadius) minRadius = s.radius;
        }
      }

      const straightRatio = totalLength > 0 ? straightLength / totalLength : 0;

      return {
        totalLength: Math.round(totalLength),
        straightLength: Math.round(straightLength),
        straightRatio,
        minRadius: minRadius === Infinity ? 0 : minRadius,
        arcCount,
        segmentCount: segs.length,
      };
    }

    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
    function round2(v) { return Math.round(v * 100) / 100; }

    function computeRecommendedParams(errorStats, segmentStats, courseStats, current) {
      let kp = current.kp;
      let ki = current.ki;
      let kd = current.kd;

      // --- PID gains ---
      // Arc segment error drives kd
      if (segmentStats.arc.stddev > 12) {
        kd *= 1.2;
      } else if (segmentStats.arc.stddev > 0 && segmentStats.arc.stddev < 5) {
        kd *= 0.85;
      }
      // Line segment error drives kp
      if (segmentStats.line.stddev > 0 && segmentStats.line.stddev < 5) {
        kp *= 1.1;
      } else if (segmentStats.line.stddev > 12) {
        kp *= 0.9;
      }
      // Oscillation
      if (errorStats.oscRate > 0.4) {
        kp *= 0.9;
        kd *= 1.15;
      } else if (errorStats.oscRate < 0.1 && errorStats.oscRate > 0) {
        kd *= 0.9;
      }
      // Steady-state error
      if (Math.abs(errorStats.mean) > 3) {
        ki = 0.01;
      }

      // --- Base speed ---
      let stabilityScore = 1.0 - errorStats.stddev / 20.0;
      stabilityScore = clamp(stabilityScore, 0.3, 1.0);
      // Scale around current base speed
      let baseSpeed = Math.round(current.baseSpeed * (0.85 + stabilityScore * 0.30));

      let outputLimit = baseSpeed;

      // --- Curve slowdown ---
      let curveSlowdown;
      if (segmentStats.arc.count === 0) {
        curveSlowdown = current.curveSlowdown;
      } else if (segmentStats.arc.stddev > 15) {
        curveSlowdown = 0.20;
      } else if (segmentStats.arc.stddev < 6) {
        curveSlowdown = 0.40;
      } else {
        curveSlowdown = 0.20 + (15 - segmentStats.arc.stddev) / 9 * 0.20;
      }

      // --- Rate limit ---
      let rateLimit = Math.max(3, Math.round(baseSpeed / 150));

      // --- CourseAware parameters ---
      let straightSpeed = Math.min(1200, Math.round(baseSpeed * 1.25));

      let minCurveSpeed;
      if (courseStats && courseStats.minRadius > 0 && courseStats.minRadius < 100) {
        minCurveSpeed = 300;
      } else if (courseStats && courseStats.minRadius > 0 && courseStats.minRadius < 200) {
        minCurveSpeed = 400;
      } else {
        minCurveSpeed = 500;
      }
      // Adjust for arc error
      if (segmentStats.arc.stddev > 15) {
        minCurveSpeed = Math.max(250, minCurveSpeed - 100);
      }

      let preBrakeDist = Math.max(150,
        Math.round((straightSpeed - minCurveSpeed) * 0.4));

      return {
        kp: round2(kp), ki: round2(ki), kd: round2(kd),
        baseSpeed, outputLimit,
        curveSlowdown: round2(curveSlowdown), rateLimit,
        straightSpeed, minCurveSpeed, preBrakeDist,
      };
    }

    /* ============================================================
       Tuning Panel Rendering
       ============================================================ */
    function renderTuningPanel() {
      const container = document.getElementById('tuning-content');
      const statusEl = document.getElementById('tuning-status');

      const analysis = tuningData.lastAnalysis;
      if (!analysis) {
        container.innerHTML =
          '<div class="tuning-placeholder">' +
          'Waiting for [CALT] log data...<br><br>' +
          'Run a course or load a .log file<br>' +
          'to analyze and recommend parameters.' +
          '</div>';
        statusEl.textContent = tuningData.caltSamples.length > 0
          ? tuningData.caltSamples.length + ' samples (need 5+)'
          : 'No data';
        return;
      }

      const { errorStats, lineStats, arcStats, worstSec, worstStddev,
        courseStats, config, recommended, errors } = analysis;

      statusEl.textContent = errorStats.sampleCount + ' samples';

      let html = '';

      // --- Error Statistics ---
      html += '<div class="tuning-section"><h3>Error Statistics</h3>';
      html += tuningRow('Samples', errorStats.sampleCount);
      html += tuningRow('Mean Error', errorStats.mean.toFixed(1));
      html += tuningRow('Std Dev', errorStats.stddev.toFixed(1));
      html += tuningRow('Max |Error|', errorStats.maxAbs);
      html += tuningRow('Osc Rate', errorStats.oscRate.toFixed(2));
      html += '</div>';

      // --- Per-type stats ---
      html += '<div class="tuning-section"><h3>Per Segment Type</h3>';
      if (lineStats.count > 0) {
        html += tuningRow('LINE mean', lineStats.mean.toFixed(1));
        html += tuningRow('LINE stddev', lineStats.stddev.toFixed(1));
      }
      if (arcStats.count > 0) {
        html += tuningRow('ARC mean', arcStats.mean.toFixed(1));
        html += tuningRow('ARC stddev', arcStats.stddev.toFixed(1));
      }
      if (worstSec >= 0) {
        const seg = mapSegments[worstSec];
        const segType = seg ? (seg.type === 'A' ? 'ARC' : 'LINE') : '?';
        const segDetail = seg && seg.type === 'A' ? ' r=' + seg.radius : '';
        html += '<div class="tuning-row"><span class="label">Worst</span>' +
          '<span class="value worst-section">#' + worstSec +
          ' (' + segType + segDetail + ') sd=' +
          worstStddev.toFixed(1) + '</span></div>';
      }
      html += '</div>';

      // --- Course Analysis ---
      if (courseStats) {
        html += '<div class="tuning-section"><h3>Course Analysis</h3>';
        html += tuningRow('Segments', courseStats.segmentCount);
        html += tuningRow('Min Radius', courseStats.minRadius > 0 ? courseStats.minRadius + 'mm' : 'N/A');
        html += tuningRow('Straight', Math.round(courseStats.straightRatio * 100) + '%');
        html += tuningRow('Total Length', courseStats.totalLength + 'mm');
        html += '</div>';
      }

      // --- Recommended Parameters ---
      html += '<div class="tuning-section"><h3>Recommended Parameters</h3>';
      html += paramRow('kp', recommended.kp, config.kp);
      html += paramRow('ki', recommended.ki, config.ki);
      html += paramRow('kd', recommended.kd, config.kd);
      html += paramRow('base_speed', recommended.baseSpeed, config.baseSpeed);
      html += paramRow('output_limit', recommended.outputLimit, config.outputLimit);
      html += paramRow('curve_slowdown', recommended.curveSlowdown, config.curveSlowdown);
      html += paramRow('rate_limit', recommended.rateLimit, config.rateLimit);
      html += paramRow('straight_speed', recommended.straightSpeed, config.straightSpeed);
      html += paramRow('min_curve_speed', recommended.minCurveSpeed, config.minCurveSpeed);
      html += paramRow('pre_brake_dist', recommended.preBrakeDist, config.preBrakeDist);
      html += '<div class="tuning-actions">' +
        '<button id="btn-copy-cpp" title="Copy as C++ code">Copy C++</button>' +
        '<button id="btn-copy-json" title="Copy as JSON">Copy JSON</button>' +
        '</div>';
      html += '</div>';

      // --- Histogram ---
      html += '<div class="tuning-section"><h3>Error Distribution</h3>';
      html += '<canvas id="tuning-histogram"></canvas>';
      html += '</div>';

      container.innerHTML = html;

      // Attach button handlers
      document.getElementById('btn-copy-cpp').addEventListener('click', () => {
        copyAsCpp(recommended, errorStats, courseStats, config);
      });
      document.getElementById('btn-copy-json').addEventListener('click', () => {
        copyAsJson(recommended);
      });

      // Draw histogram
      drawHistogram(errors);
    }

    function tuningRow(label, value) {
      return '<div class="tuning-row">' +
        '<span class="label">' + label + '</span>' +
        '<span class="value">' + value + '</span></div>';
    }

    function paramRow(label, recommended, current) {
      const diff = recommended - current;
      let deltaHtml = '';
      if (Math.abs(diff) < 0.005) {
        deltaHtml = '<span class="delta same">-</span>';
      } else if (diff > 0) {
        deltaHtml = '<span class="delta up">+' + formatNum(diff) + '</span>';
      } else {
        deltaHtml = '<span class="delta down">' + formatNum(diff) + '</span>';
      }
      return '<div class="tuning-row">' +
        '<span class="label">' + label + '</span>' +
        '<span class="value">' + formatNum(recommended) +
        ' <span style="color:var(--text-dim);font-weight:400">(' +
        formatNum(current) + ')</span> ' + deltaHtml + '</span></div>';
    }

    function formatNum(v) {
      if (Number.isInteger(v)) return v.toString();
      return v.toFixed(2);
    }

    /* ============================================================
       Copy Functions
       ============================================================ */
    function copyAsCpp(rec, errorStats, courseStats, config) {
      const lines = [
        '// --- Auto-tuned parameters (from BLE Logger analysis) ---',
        '// Error stats: mean=' + errorStats.mean.toFixed(1) +
        ', stddev=' + errorStats.stddev.toFixed(1) +
        ', maxAbs=' + errorStats.maxAbs +
        ', oscRate=' + errorStats.oscRate.toFixed(2),
      ];
      if (courseStats) {
        lines.push('// Course: ' + courseStats.segmentCount + ' segments' +
          ', minR=' + courseStats.minRadius + 'mm' +
          ', straight=' + Math.round(courseStats.straightRatio * 100) + '%');
      }
      lines.push(
        'tracer.setGains(' + rec.kp.toFixed(2) + 'F, ' +
        rec.ki.toFixed(2) + 'F, ' + rec.kd.toFixed(2) + 'F);',
        'tracer.setBaseSpeed(' + rec.baseSpeed + ');',
        'tracer.setOutputLimit(' + rec.outputLimit + ');',
        'tracer.setCurveSlowdown(' + rec.curveSlowdown.toFixed(2) + 'F);',
        'tracer.setSpeedRateLimit(' + rec.rateLimit + ');',
        'courseLineTrace.setStraightSpeed(' + rec.straightSpeed + ');',
        'courseLineTrace.setMinCurveSpeed(' + rec.minCurveSpeed + ');',
        'courseLineTrace.setPreBrakeDistance(' + rec.preBrakeDist + '.0F);',
      );
      const text = lines.join('\n');
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('btn-copy-cpp');
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy C++'; }, 1500);
      });
    }

    function copyAsJson(rec) {
      const text = JSON.stringify(rec, null, 2);
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('btn-copy-json');
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy JSON'; }, 1500);
      });
    }

    /* ============================================================
       Error Histogram
       ============================================================ */
    function drawHistogram(errors) {
      const canvas = document.getElementById('tuning-histogram');
      if (!canvas) return;
      const ctx2 = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      ctx2.setTransform(dpr, 0, 0, dpr, 0, 0);

      ctx2.fillStyle = '#0d1117';
      ctx2.fillRect(0, 0, w, h);

      if (errors.length < 2) return;

      // Compute histogram bins
      const minE = Math.min(...errors);
      const maxE = Math.max(...errors);
      const range = maxE - minE;
      if (range < 1) return;

      const numBins = Math.min(30, Math.max(10, Math.ceil(errors.length / 5)));
      const binWidth = range / numBins;
      const bins = new Array(numBins).fill(0);

      for (const e of errors) {
        let idx = Math.floor((e - minE) / binWidth);
        if (idx >= numBins) idx = numBins - 1;
        bins[idx]++;
      }

      const maxCount = Math.max(...bins);
      const margin = { left: 30, right: 10, top: 8, bottom: 18 };
      const plotW = w - margin.left - margin.right;
      const plotH = h - margin.top - margin.bottom;
      const barW = plotW / numBins;

      // Draw bars
      for (let i = 0; i < numBins; i++) {
        const barH = maxCount > 0 ? (bins[i] / maxCount) * plotH : 0;
        const x = margin.left + i * barW;
        const y = margin.top + plotH - barH;
        // Color: center bins green, edge bins red
        const center = numBins / 2;
        const dist = Math.abs(i - center) / center;
        const r = Math.round(78 + dist * 155);
        const g = Math.round(204 - dist * 120);
        const b = Math.round(163 - dist * 100);
        ctx2.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
        ctx2.fillRect(x + 1, y, barW - 2, barH);
      }

      // X axis labels
      ctx2.fillStyle = '#555';
      ctx2.font = '9px ' + getComputedStyle(document.body).fontFamily;
      ctx2.textAlign = 'center';
      ctx2.textBaseline = 'top';
      ctx2.fillText(Math.round(minE).toString(), margin.left, h - margin.bottom + 4);
      ctx2.fillText('0', margin.left + plotW * (-minE / range), h - margin.bottom + 4);
      ctx2.fillText(Math.round(maxE).toString(), margin.left + plotW, h - margin.bottom + 4);

      // Y axis label
      ctx2.textAlign = 'right';
      ctx2.textBaseline = 'top';
      ctx2.fillText(maxCount.toString(), margin.left - 2, margin.top);
    }
